[project]
name = ""
description = ""

[acquire]
unpaywall = true
arxiv = true
pmc = true
institutional_proxy = ""
scihub = true
max_retries = 3
download_timeout = 30
# 网络代理（支持 socks5:// / http:// / https://）
# 启用后 Sci-Hub 和出版商直链走代理，解决 GFW 封锁问题
# proxy_url = "socks5://127.0.0.1:7890"
# proxy_mode = "blocked-only"        # all = 全部请求走代理; blocked-only = 仅封锁源

# 中国高校机构访问（CARSI 联邦认证）
china_institutional = false
china_institution_id = ""            # zju / pku / tsinghua / fudan / sjtu / ust
china_custom_idp_entity_id = ""      # 非预置大学时填写 IdP entityID

# 中文数据库（需先通过 CARSI 登录获取 cookie）
enable_cnki = true
enable_wanfang = true

[discovery]
citation_depth = 2
max_papers_per_seed = 50
relevance_threshold = 0.3

[analysis]
max_tokens_per_chunk = 80000
include_key_references = true
auto_map_concepts = true

[rag]
embedding_model = "text-embedding-3-small"
embedding_dim = 1536
chunk_overlap = 200
default_top_k = 10
cross_paper_context_k = 5

[language]
internal = "en"
output_default = "zh"

[llm]
default_provider = "claude"                  # claude / openai / deepseek
default_model = "claude-sonnet-4-20250514"

[llm.discover]
provider = "deepseek"
model = "deepseek-chat"

[llm.analyze]
provider = "claude"
model = "claude-opus-4-20250901"

[llm.article]
provider = "claude"
model = "claude-opus-4-20250901"

[api_keys]
semantic_scholar = ""
unpaywall_email = ""
web_search_api_key = "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"

[web_search]
enabled = true
backend = "tavily"

[workspace]
base_dir = "workspace"
