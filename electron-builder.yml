appId: com.abyssal.app
productName: Abyssal
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - config/**/*
  - templates/**/*
  - package.json
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
