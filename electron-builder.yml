appId: com.abyssal.app
productName: Abyssal
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - config/**/*
  - templates/**/*
  - package.json
asarUnpack:
  - "node_modules/better-sqlite3/**"
  - "node_modules/sqlite-vec/**"
  - "node_modules/sqlite-vec-*/**"
  - "node_modules/mupdf/**"
  - "node_modules/onnxruntime-node/**"
  - "node_modules/tesseract.js/**"
  - "node_modules/jsdom/**"
extraResources:
  - from: assets/models/
    to: models/
    filter:
      - "**/*.onnx"
  - from: assets/tesseract/
    to: tesseract/
    filter:
      - "**/*.traineddata"
win:
  target:
    - nsis
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
