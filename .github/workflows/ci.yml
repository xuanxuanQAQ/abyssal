# ══════════════════════════════════════════════════════════════
# Abyssal CI — 全量检查流水线
#
# 检查维度（本地 npm test 只覆盖 #4）：
#   1. 类型安全     tsc --noEmit（全项目零 TS 错误）
#   2. 代码风格     eslint（强制一致性）
#   3. 原生模块编译  postinstall → npm rebuild better-sqlite3（ABI 对齐系统 Node.js）
#   4. 单元测试     vitest --project unit（纯逻辑，无 I/O）
#   5. 集成测试     vitest --project integration（真实 SQLite）
#   6. 渲染测试     vitest --project renderer（React 组件 + jsdom）
#   7. 构建验证     esbuild + vite build（确保产物可生成）
#   8. 打包验证     electron-builder --dir（确保可打包，不发布）
# ══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore: ['**.md', 'LICENSE', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', 'docs/**']

# 同一分支的新 push 自动取消正在跑的旧 CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────
  # Gate 1: 快速检查（<2 分钟）
  # 类型 + 风格，不需要原生模块
  # ──────────────────────────────────────────
  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (skip native rebuild for typecheck)
        run: npm ci
        env:
          npm_config_ignore_scripts: true

      - name: TypeScript — full project check
        run: npx tsc --noEmit

      - name: ESLint (zero errors, warnings allowed)
        run: npx eslint src/

  # ──────────────────────────────────────────
  # Gate 2: 测试矩阵（核心）
  # 跨 OS 验证，含原生模块重编
  # ──────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        # postinstall → npm rebuild better-sqlite3 → 系统 Node ABI（子进程直接可用）

      - name: Unit tests
        run: npx vitest run --project unit --reporter=verbose

      - name: Integration tests
        run: npx vitest run --project integration --reporter=verbose

      - name: Renderer tests
        run: npx vitest run --project renderer --reporter=verbose

      - name: Upload coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
        continue-on-error: true

  # ──────────────────────────────────────────
  # Gate 3: 构建验证
  # 确保 esbuild + vite 产物可正常生成
  # ──────────────────────────────────────────
  build:
    name: Build verification
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 构建主进程（esbuild）
      - name: Build main process
        run: node esbuild.main.mjs

      # 构建渲染进程（vite）
      - name: Build renderer
        run: npx vite build -c vite.renderer.config.ts

      # 验证产物存在
      - name: Verify build artifacts
        run: |
          test -f dist/electron/main.js || (echo "main.js missing" && exit 1)
          test -d dist/renderer || (echo "renderer/ missing" && exit 1)
          echo "Build artifacts OK"

      # 上传构建产物供 package job 复用
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────
  # Gate 4: 打包验证（仅 main 分支）
  # 确保 electron-builder 能产出安装包
  # 复用 build job 的 dist/ 产物，避免重复构建
  # ──────────────────────────────────────────
  package:
    name: Package (${{ matrix.os }})
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 下载 build job 的产物（避免重复构建）
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: dist/

      # --dir 只生成目录形式的包，不生成安装程序（快 + 不需要签名）
      - name: Package (dir only)
        run: npx electron-builder --dir
        env:
          # 跳过代码签名（CI 不需要）
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify package output
        shell: bash
        run: |
          if [ -d release ]; then
            echo "Package output:"
            ls -la release/*/
          else
            echo "WARNING: release/ directory not found"
          fi
