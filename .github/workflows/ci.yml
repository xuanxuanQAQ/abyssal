# ══════════════════════════════════════════════════════════════
# Abyssal CI — 分层验证流水线
#
# 目标：
#   1. PR 保持快速反馈：Ubuntu + 仅跑受影响测试项目
#   2. 主干 push 保留跨平台兜底：Windows/macOS/Linux
#   3. build / package 只在必要时执行，避免测试改动重复耗时构建
# ══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, dev]
    paths-ignore: ['**.md', 'LICENSE', 'docs/**']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', 'docs/**']

# 同一分支的新 push 自动取消正在跑的旧 CI
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  check:
    name: Typecheck + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (skip native rebuild for typecheck)
        run: npm ci
        env:
          npm_config_ignore_scripts: true

      - name: TypeScript — full project check
        run: npx tsc --noEmit

      - name: ESLint (zero errors, warnings allowed)
        run: npx eslint src/

  changes:
    name: Detect changed surfaces
    runs-on: ubuntu-latest
    outputs:
      unit: ${{ steps.filter.outputs.unit }}
      integration: ${{ steps.filter.outputs.integration }}
      renderer: ${{ steps.filter.outputs.renderer }}
      golden: ${{ steps.filter.outputs.golden }}
      robustness: ${{ steps.filter.outputs.robustness }}
      build: ${{ steps.filter.outputs.build }}

    steps:
      - uses: actions/checkout@v4

      - name: Classify changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            unit:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.main.json'
              - 'src/adapter/**'
              - 'src/cli/**'
              - 'src/copilot-runtime/**'
              - 'src/core/**'
              - 'src/electron/**'
              - 'src/shared-types/**'
            integration:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.main.json'
              - 'src/core/**'
              - 'src/db-process/**'
              - 'src/dla-process/**'
              - 'src/electron/**'
              - 'src/mcp-adapter/**'
              - 'src/shared/**'
              - 'src/shared-types/**'
              - 'tests/integration/**'
            renderer:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.main.json'
              - 'src/renderer/**'
              - 'src/electron/preload.ts'
              - 'src/electron/ipc/**'
              - 'src/shared-types/**'
            golden:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'tests/golden/**'
              - 'src/adapter/**'
              - 'src/core/**'
              - 'src/copilot-runtime/**'
            robustness:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'vitest.config.ts'
              - 'tests/robustness/**'
              - 'src/adapter/**'
              - 'src/core/**'
              - 'src/copilot-runtime/**'
              - 'src/electron/**'
            build:
              - '.github/workflows/ci.yml'
              - 'package.json'
              - 'package-lock.json'
              - 'electron-builder.yml'
              - 'esbuild.main.mjs'
              - 'vite.renderer.config.ts'
              - 'tsconfig.json'
              - 'tsconfig.main.json'
              - 'assets/**'
              - 'config/**'
              - 'src/**'
              - '!src/**/*.test.ts'
              - '!src/**/*.test.tsx'
              - '!src/**/__tests__/**'
              - '!src/__test-utils__/**'
              - 'templates/**'

  pr-test:
    name: PR tests (ubuntu)
    needs: [check, changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.unit == 'true' || needs.changes.outputs.integration == 'true' || needs.changes.outputs.renderer == 'true' || needs.changes.outputs.golden == 'true' || needs.changes.outputs.robustness == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        if: needs.changes.outputs.unit == 'true'
        run: npx vitest run --project unit --reporter=verbose

      - name: Integration tests
        if: needs.changes.outputs.integration == 'true'
        run: npx vitest run --project integration --reporter=verbose

      - name: Renderer tests
        if: needs.changes.outputs.renderer == 'true'
        run: npx vitest run --project renderer --reporter=verbose

      - name: Golden tests
        if: needs.changes.outputs.golden == 'true'
        run: npx vitest run --project golden --reporter=verbose

      - name: Robustness tests
        if: needs.changes.outputs.robustness == 'true'
        run: npx vitest run --project robustness --reporter=verbose

  push-test:
    name: Push tests (${{ matrix.os }})
    needs: [check, changes]
    if: github.event_name == 'push' && (needs.changes.outputs.unit == 'true' || needs.changes.outputs.integration == 'true' || needs.changes.outputs.renderer == 'true' || needs.changes.outputs.golden == 'true' || needs.changes.outputs.robustness == 'true')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        if: needs.changes.outputs.unit == 'true'
        run: npx vitest run --project unit --reporter=verbose

      - name: Integration tests
        if: needs.changes.outputs.integration == 'true'
        run: npx vitest run --project integration --reporter=verbose

      - name: Renderer tests
        if: needs.changes.outputs.renderer == 'true'
        run: npx vitest run --project renderer --reporter=verbose

      - name: Golden tests
        if: needs.changes.outputs.golden == 'true'
        run: npx vitest run --project golden --reporter=verbose

      - name: Robustness tests
        if: needs.changes.outputs.robustness == 'true'
        run: npx vitest run --project robustness --reporter=verbose

  build:
    name: Build verification (ubuntu)
    needs: [check, changes]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main process
        run: node esbuild.main.mjs

      - name: Build renderer
        run: npx vite build -c vite.renderer.config.ts

      - name: Verify build artifacts
        run: |
          test -f dist/electron/main.js || (echo "main.js missing" && exit 1)
          test -d dist/renderer || (echo "renderer/ missing" && exit 1)
          echo "Build artifacts OK"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 1

  package:
    name: Package (${{ matrix.os }})
    needs: [push-test, build, changes]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.build == 'true' && needs.build.result == 'success' && (needs.push-test.result == 'success' || needs.push-test.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: dist/

      - name: Package (dir only)
        run: npx electron-builder --dir
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify package output
        shell: bash
        run: |
          if [ -d release ]; then
            echo "Package output:"
            ls -la release/*/
          else
            echo "WARNING: release/ directory not found"
          fi
